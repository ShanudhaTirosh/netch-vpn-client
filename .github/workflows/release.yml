name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # Uncomment to also ship macOS/Linux (see docs/ASSUMPTIONS.md #8 first):
          # - { platform: macos-latest,  target: aarch64-apple-darwin }
          # - { platform: ubuntu-22.04,  target: x86_64-unknown-linux-gnu }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS deps
        run: npm ci

      - name: Fetch sing-box sidecar
        run: node scripts/fetch-singbox.mjs

      - name: Build app + create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Netch VPN ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'Desktop client installer. Windows: NSIS .exe. Verify with docs/TESTPLAN.md.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
